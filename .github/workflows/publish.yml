name: Publish build to repo.tehbrian.dev

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish package
        run: ./gradlew build publish -x requireClean -x signMavenPublication
        env:
          ORG_GRADLE_PROJECT_tehbrianUsername: ${{ secrets.TEHBRIAN_USERNAME }}
          ORG_GRADLE_PROJECT_tehbrianPassword: ${{ secrets.TEHBRIAN_PASSWORD }}
